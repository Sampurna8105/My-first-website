<!DOCTYPE html>
<html lang="en">

<head>
    <title>Support - Game Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="support.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="main-support">

        <!-- Navbar -->
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">Game Store</h2>
            </div>

            <div class="menu">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="store.html">STORE</a></li>
                    <li><a href="library.html">LIBRARY</a></li>
                    <li><a href="index.html#about">ABOUT</a></li>
                    <li><a href="support.html" class="active">SUPPORT</a></li>
                </ul>
            </div>
        </div>

        <div class="support-container">

            <h1>Customer Support</h1>
            <p>Need help? We're here for you 24/7.</p>

            <!-- Contact Info -->
            <div class="support-info">
                <div class="info-box">
                    <i class="fas fa-envelope"></i>
                    <h3>Email</h3>
                    <p>sampurna@gamestore.com</p>
                </div>

                <div class="info-box">
                    <i class="fas fa-phone"></i>
                    <h3>Phone</h3>
                    <p>+977-9800000000</p>
                </div>

                <div class="info-box">
                    <i class="fab fa-discord"></i>
                    <h3>Discord</h3>
                    <p>Join our server</p>
                </div>
            </div>

            <div class="support-form">
                <h2>Send us a message</h2>

                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Describe your problem.." required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
